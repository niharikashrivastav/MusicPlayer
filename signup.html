<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhwani — Signup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); min-height:100vh; display:flex; flex-direction:column; color:white; }
nav ul { display:flex; justify-content:center; align-items:center; gap:30px; padding:15px; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); list-style:none; }
nav ul li { cursor:pointer; transition:0.3s; }
nav ul li a { color:white; text-decoration:none; }
nav ul li a:hover { color:#1db954; }
.brand { font-weight:bold; font-size:18px; }
.auth-wrapper { flex:1; display:flex; justify-content:center; align-items:center; padding:40px 20px; }
.auth-card { background:rgba(255,255,255,0.07); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.15); border-radius:24px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.4); animation:slideUp 0.5s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);} }
.auth-card h2 { text-align:center; font-size:28px; font-weight:700; margin-bottom:6px; }
.auth-card .subtitle { text-align:center; color:rgba(255,255,255,0.5); font-size:14px; margin-bottom:36px; }
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.input-wrap { position:relative; }
.input-wrap i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.4); font-size:15px; }
.form-group input { width:100%; padding:14px 16px 14px 44px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:12px; color:white; font-size:15px; outline:none; transition:0.3s; }
.form-group input::placeholder { color:rgba(255,255,255,0.3); }
.form-group input:focus { border-color:#1db954; background:rgba(29,185,84,0.08); box-shadow:0 0 0 3px rgba(29,185,84,0.15); }
.strength-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.1); margin-top:8px; overflow:hidden; }
.strength-fill { height:100%; border-radius:2px; width:0%; transition:0.4s; }
.btn { width:100%; padding:15px; background:#1db954; color:white; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; margin-top:8px; }
.btn:hover { background:#17a449; transform:translateY(-1px); box-shadow:0 6px 20px rgba(29,185,84,0.35); }
.btn:disabled { background:#555; cursor:not-allowed; transform:none; box-shadow:none; }
.msg { text-align:center; margin-top:16px; padding:12px; border-radius:10px; font-size:14px; display:none; }
.msg.success { background:rgba(29,185,84,0.2); color:#1db954; border:1px solid rgba(29,185,84,0.3); }
.msg.error   { background:rgba(255,80,80,0.2); color:#ff6b6b; border:1px solid rgba(255,80,80,0.3); }
.switch-link { text-align:center; margin-top:24px; font-size:14px; color:rgba(255,255,255,0.5); }
.switch-link a { color:#1db954; text-decoration:none; font-weight:600; }
</style>
</head>
<body>

<nav>
    <ul>
        <li class="brand">🎧 Dhwani</li>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="signup.html">Signup</a></li>
    </ul>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Join Dhwani 🎵</h2>
        <p class="subtitle">Create your free account</p>

        <div class="form-group">
            <label>Username</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="cooluser123">
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)">
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        </div>

        <button class="btn" id="signupBtn" onclick="handleSignup()">Create Account</button>
        <div class="msg" id="msg"></div>

        <div class="switch-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>
</div>

<script>
function checkStrength(password) {
    const fill = document.getElementById('strengthFill');
    let strength = 0;
    if (password.length >= 6)        strength++;
    if (password.length >= 10)       strength++;
    if (/[A-Z]/.test(password))      strength++;
    if (/[0-9]/.test(password))      strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;
    const colors = ['','#ff4444','#ff9900','#ffcc00','#1db954','#1db954'];
    const widths = ['0%','20%','40%','60%','80%','100%'];
    fill.style.width = widths[strength];
    fill.style.background = colors[strength];
}

async function handleSignup() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('signupBtn');

    if (!username || !email || !password) { showMsg('Please fill in all fields.', 'error'); return; }
    if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
        // ✅ Calls PHP backend
        const res  = await fetch('../api/signup.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();

        if (res.ok) {
            showMsg('✅ ' + data.message, 'success');
            setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
            showMsg('❌ ' + data.message, 'error');
        }
    } catch (e) {
        showMsg('❌ Could not connect to server.', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
    }
}

function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
    msg.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
</script>
</body>
</html>
